  <title id="title">Verkehrszeichen C43 - Maximum speed is as indicated until the next intersection, or until another (zonal) C43 sign, or until the sign that indicates the start or end of a built up area, living street or pedestrian zone. When the sign C43 indicates &quot;30&quot; and is put above a F1 sign, the maximum speed applies to the entire built-up area.</title>
