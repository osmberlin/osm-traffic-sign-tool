# Triggers a Cursor cloud agent when a QA issue is opened (cursor-qa or per-page labels).
# See https://cursor.com/docs/cloud-agent and .github/CURSOR_QA_AUTOMATION.md
name: Cursor QA automation

on:
  issues:
    types: [opened, labeled]
  push:
    branches:
      - main
    paths:
      - '.github/workflows/cursor-qa-automation.yml'
      - '.github/scripts/**'

permissions:
  issues: write

jobs:
  validate-workflow-on-push:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Workflow file check (push validation only)
        run: echo "Cursor QA automation runs on issues with label cursor-qa, tagging-qa, combination-qa, or question-qa."

  post-cursor-trigger:
    if: |
      github.event_name == 'issues' && (
        (github.event.action == 'opened' && (
          contains(github.event.issue.labels.*.name, 'cursor-qa') ||
          contains(github.event.issue.labels.*.name, 'tagging-qa') ||
          contains(github.event.issue.labels.*.name, 'combination-qa') ||
          contains(github.event.issue.labels.*.name, 'question-qa')
        )) ||
        (github.event.action == 'labeled' && (
          github.event.label.name == 'cursor-qa' ||
          github.event.label.name == 'tagging-qa' ||
          github.event.label.name == 'combination-qa' ||
          github.event.label.name == 'question-qa'
        ))
      )
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: package.json

      - name: Start Cursor agent via issue comment
        run: bun run .github/scripts/cursorQaAutomation.ts
        env:
          GITHUB_TOKEN: ${{ github.token }}

  issue-noop:
    if: |
      github.event_name == 'issues' && !(
        (github.event.action == 'opened' && (
          contains(github.event.issue.labels.*.name, 'cursor-qa') ||
          contains(github.event.issue.labels.*.name, 'tagging-qa') ||
          contains(github.event.issue.labels.*.name, 'combination-qa') ||
          contains(github.event.issue.labels.*.name, 'question-qa')
        )) ||
        (github.event.action == 'labeled' && (
          github.event.label.name == 'cursor-qa' ||
          github.event.label.name == 'tagging-qa' ||
          github.event.label.name == 'combination-qa' ||
          github.event.label.name == 'question-qa'
        ))
      )
    runs-on: ubuntu-latest
    steps:
      - name: No-op for other issue events
        run: echo "Issue event ignored (not a Cursor QA trigger)."
