name: App 'Traffic Sign Tool' — Deploy to Github Pages

on:
  push:
    branches:
      - main
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# Cancel in-progress runs.
concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: package.json
          cache: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          # See ./NODE_VERSION.md
          node-version-file: '.nvmrc'

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Install dependencies (Monorepo)
        run: bun install --frozen-lockfile

      - name: Build monorepo (Vite app and packages)
        env:
          GITHUB_PAGES: true
        run: |
          bun run --cwd packages/internal_wiki build
          bun run --cwd packages/internal_taginfo build
          bun run --cwd packages/traffic-sign-converter build
          bun run --cwd packages/internal_svgs build
          bun run --cwd apps/traffic-sign-tool build

      - name: Add SPA fallback for GitHub Pages
        run: cp dist/index.html dist/404.html
        working-directory: apps/traffic-sign-tool

      - name: Upload artifact (Vite)
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./apps/traffic-sign-tool/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
