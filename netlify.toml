# Netlify deploy previews for pull requests only.
#
# Builds from the monorepo root so workspace packages (@osm-traffic-signs/converter,
# @internal/*) are linked from the checked-in source — not from npm releases.
#
# Production deploys stay on GitHub Pages (.github/workflows/app-traffic-sign-tool-deploy.yml).

[build]
# Node: .nvmrc (also mirrored in package.json engines.node)
# Bun: package.json packageManager + bun.lock (Netlify runs bun install when bun.lock is present)
command = "bun run build"
publish = "apps/traffic-sign-tool/dist"
# Exit 0 = skip build. Only run for PR deploy previews, not main/develop pushes.
ignore = "bash -c 'test \"$CONTEXT\" = \"deploy-preview\" && exit 1 || exit 0'"

[context.deploy-preview.environment]
VITE_NETLIFY = "true"
VITE_DEPLOY_CONTEXT = "deploy-preview"
VITE_DEPLOY_BRANCH = "$BRANCH"
VITE_DEPLOY_URL = "$DEPLOY_PRIME_URL"

# TanStack Router SPA — serve index.html for client-side routes.
[[redirects]]
from = "/*"
to = "/index.html"
status = 200
